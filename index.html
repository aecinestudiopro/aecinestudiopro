<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Chatbot - White Theme</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 95%; max-width: 450px; height: 85vh; background: white; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 20px; border-bottom: 1px solid #eee; text-align: center; color: #1a73e8; font-weight: bold; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #fff; }
        .msg { max-width: 80%; padding: 12px; border-radius: 15px; font-size: 14px; line-height: 1.4; position: relative; }
        .user { align-self: flex-end; background: #1a73e8; color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #f1f3f4; color: #333; border-bottom-left-radius: 2px; }
        .input-area { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        button { background: #1a73e8; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .err { color: red; font-size: 12px; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">Gemini AI Assistant <span style="color: #2ecc71; font-size: 10px;">● Online</span></div>
    <div id="chat-box">
        <div class="msg ai">Namaste! Main Sarthak ka assistant hoon. Main ab working mode mein hoon. Poochein!</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Message likhein..." autocomplete="off">
        <button onclick="askAI()">Bhejein</button>
    </div>
</div>

<script>
    // 1. Apni API KEY yahan check karein
    const API_KEY = "AIzaSyCzt98r7i0bEJThxxbdmJxKCl421wnB0as"; 
    
    async function askAI() {
        const input = document.getElementById("user-input");
        const chatBox = document.getElementById("chat-box");
        const msg = input.value.trim();
        if(!msg) return;

        // User message add karein
        chatBox.innerHTML += `<div class="msg user">${msg}</div>`;
        input.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        // Loading indicator
        const loadingMsg = document.createElement("div");
        loadingMsg.className = "msg ai";
        loadingMsg.innerText = "Soch raha hoon...";
        chatBox.appendChild(loadingMsg);

        try {
            // 2. Updated API URL - v1beta version with gemini-1.5-flash
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: msg }] }] })
            });

            const data = await response.json();
            
            if(data.candidates && data.candidates[0].content) {
                loadingMsg.innerText = data.candidates[0].content.parts[0].text;
            } else {
                // Agar model not found error aaye toh dusra model try karein automatically
                console.log("Retrying with gemini-pro...");
                const fallbackResponse = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: msg }] }] })
                });
                const fallbackData = await fallbackResponse.json();
                
                if(fallbackData.candidates) {
                    loadingMsg.innerText = fallbackData.candidates[0].content.parts[0].text;
                } else {
                    loadingMsg.innerText = "Error: " + (data.error ? data.error.message : "API limit ya Model issue");
                }
            }
        } catch (e) {
            loadingMsg.innerText = "Connection Error! Check internet.";
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Enter key support
    document.getElementById("user-input").addEventListener("keypress", (e) => {
        if(e.key === "Enter") askAI();
    });
</script>

</body>
</html>
