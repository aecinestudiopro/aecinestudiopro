<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Chatbot</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 600px;
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 20px;
            background: #ffffff;
            border-bottom: 1px solid #eee;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: #333;
        }

        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .user-message {
            align-self: flex-end;
            background-color: #007bff;
            color: white;
            border-bottom-right-radius: 2px;
        }

        .ai-message {
            align-self: flex-start;
            background-color: #e9ecef;
            color: #333;
            border-bottom-left-radius: 2px;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: #007bff;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0056b3;
        }

        .loading {
            font-style: italic;
            color: #888;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">Gemini AI Assistant</div>
    <div id="chat-box">
        <div class="message ai-message">Namaste! Main aapki kaise madad kar sakta hoon?</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Yahan likhein..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Bhejein</button>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyDk8qEauCUoFIxRYz0SVdGtr89l15bCuFk";
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

    async function sendMessage() {
        const inputField = document.getElementById("user-input");
        const chatBox = document.getElementById("chat-box");
        const messageText = inputField.value.trim();

        if (messageText === "") return;

        // User message add karein
        appendMessage(messageText, 'user-message');
        inputField.value = "";

        // Loading indicator
        const loadingDiv = document.createElement("div");
        loadingDiv.className = "message ai-message loading";
        loadingDiv.innerText = "AI soch raha hai...";
        chatBox.appendChild(loadingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: messageText }] }]
                })
            });

            const data = await response.json();
            chatBox.removeChild(loadingDiv);

            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const aiResponse = data.candidates[0].content.parts[0].text;
                appendMessage(aiResponse, 'ai-message');
            } else {
                appendMessage("Maaf kijiye, kuch galat hua.", 'ai-message');
            }
        } catch (error) {
            chatBox.removeChild(loadingDiv);
            appendMessage("Error: API connect nahi ho payi.", 'ai-message');
            console.error(error);
        }
    }

    function appendMessage(text, className) {
        const chatBox = document.getElementById("chat-box");
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${className}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    }
</script>

</body>
</html>
